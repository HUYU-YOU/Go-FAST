<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoFast - Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="bg-slider"></div>

        <div id="global-audio-controls">
            <button id="mute-btn" onclick="toggleMute()">🔊</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeGlobalVolume(this.value)">
        </div>

        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <div id="top-hud">
            <div id="minimap-container"></div>
            <div id="radio-wrapper">
                <span id="radio-display">📻 RADIO: OFF</span>
            </div>
            <div id="wanted-display">WANTED: ★</div>
        </div>

        <div id="bottom-hud">
            <span id="health">HULL: 5/5</span>
            <span id="fuel">FUEL: 100%</span>
            <span id="nitro">NITRO: 0% [SPACE]</span>
            <span id="cargo">CARGO: 0/5</span>
        </div>

        <div id="main-menu" class="screen with-bg">
            <div class="screen-content">
                <h1>GO-FAST</h1>
                <p>Click anywhere to enable audio</p>
                <button id="play-btn" onclick="showScreen('car-select')">PLAY</button>
            </div>
        </div>

        <div id="car-select" class="screen with-bg" style="display: none;">
            <div class="screen-content">
                <h2>SELECT YOUR RIDE</h2>
                <div class="car-roster">
                    <div class="car-card" onclick="startGame('fer')"><h3>FERRARI</h3></div>
                    <div class="car-card" onclick="startGame('gti')"><h3>GTI</h3></div>
                    <div class="car-card" onclick="startGame('cab')"><h3>CABRIOLET</h3></div>
                </div>
                <button onclick="showScreen('main-menu')">BACK</button>
            </div>
        </div>

        <div id="loading-screen" class="screen with-bg" style="display: none;">
            <div class="screen-content">
                <h2>LOADING...</h2>
                <div id="loading-bar-bg"><div id="loading-bar"></div></div>
                <p id="loading-text" style="margin-top: 15px; font-weight: bold; font-size: 18px; color: #00ffcc;">0%</p>
            </div>
        </div>

        <div id="message-screen" class="screen with-bg" style="display: none;">
            <div class="screen-content">
                <h1 id="msg-title"></h1>
                <p id="msg-sub"></p>
                <button onclick="location.reload()">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script src="js/input.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/map.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
